name: Pullfrog-rs PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: pullfrog-rs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v3

      - name: Build
        run: cargo build --release

      - name: Review PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://api.openai.com/v1' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-5-mini' }}
          PULLFROG_PROVIDER: openai-compatible
          PULLFROG_SUMMARY_ONLY: "true"
          PULLFROG_MAX_DIFF_BYTES: "180000"
          PULLFROG_CHUNK_BYTES: "45000"
          PULLFROG_IGNORE: "**/Cargo.lock,**/package-lock.json,**/pnpm-lock.yaml,**/yarn.lock,**/dist/**,**/build/**"
          RUST_LOG: info
        run: ./target/release/pullfrog-rs review
