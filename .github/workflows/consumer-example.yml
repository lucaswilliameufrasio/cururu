# Example: Add this file to any repository to enable Cururu PR reviews.
#
# .github/workflows/cururu-review.yml
#
# Requirements:
#   1. Add LLM_API_KEY as a repository secret
#   2. (Optional) Add a .cururu.toml at the repository root
#   3. Push this workflow file

name: Cururu PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: cururu-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: lucaswilliameufrasio/cururu@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          llm_api_key: ${{ secrets.LLM_API_KEY }}
