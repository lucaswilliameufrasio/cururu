name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate platform tags
        id: tags
        run: |
          TAG="ghcr.io/${{ github.repository }}:${{ github.ref_name }}-${{ matrix.suffix }}"
          echo "tags=$TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "tags=$TAG" >> "$GITHUB_OUTPUT"

      - name: Docker labels
        id: labels
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.labels.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.suffix }}
          provenance: true
          sbom: true

  merge:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multiarch manifest
        run: |
          IMG="ghcr.io/${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          MAJOR="v$(echo $TAG | sed 's/v\([0-9]*\).*/\1/')"
          docker buildx imagetools create \
            -t "$IMG:$TAG" \
            -t "$IMG:$MAJOR" \
            -t "$IMG:latest" \
            "$IMG:$TAG-amd64" \
            "$IMG:$TAG-arm64"

      - name: Image summary
        run: |
          IMG="ghcr.io/${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          DIGEST="sha256:e01c31d4538dd980a1266809a2126647a48061020ab3012a1bf59c2f52db3046"
          {
            echo "## Image released"
            echo ""
            echo "**Repository:** \`${{ github.repository }}\`"
            echo "**Tags:** \`$TAG\`, \`v$(echo $TAG | sed 's/v\([0-9]*\).*/\1/')\`, \`latest\`"
            echo "**Manifest digest:** \`$DIGEST\`"
            echo ""
            echo "### Platforms"
            echo '```'
            docker manifest inspect "$IMG:$TAG" --verbose 2>/dev/null
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
