version = 1

[provider]
name = "openrouter"
model = "openai/gpt-5.6-luna"

[review]
max_diff_bytes = 180000
chunk_bytes = 45000
ignore = [
  "**/target/**",
  "**/*.lock",
  "**/dist/**",
  "**/build/**",
]
language = "pt-BR"

[context]
conventions = [
  "CONTRIBUTING.md",
  "AGENTS.md",
]
specifications = [
  "docs/specs/**/*.md",
  "docs/sdd/**/*.md",
  "docs/gdd/**/*.md",
]
skills = []
additional = [
  "docs/adr/**/*.md",
]
max_bytes = 100000

[summary]
show_cost = false
show_usage = true
